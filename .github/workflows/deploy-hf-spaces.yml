name: Deploy to Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Prepare HF repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE" ]; then
            echo "HF_TOKEN or HF_SPACE secret is missing" && exit 1
          fi
          REPO_URL="https://$HF_TOKEN@huggingface.co/spaces/$HF_SPACE"
          rm -rf /tmp/hf_space || true
          git clone "$REPO_URL" /tmp/hf_space || (echo "Clone failed - ensure the Space exists and token has write access" && exit 1)
          rsync -a --delete --exclude='.git' ./ /tmp/hf_space/
          cd /tmp/hf_space
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "CI: deploy to Hugging Face Space"
            git push "$REPO_URL" HEAD:main
          fi
